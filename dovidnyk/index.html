<!-- Фінальний скрипт для мобільних (з агресивним відстеженням) -->
<script>
(function() {
    const STORAGE_KEY = 'flipbook_last_page';
    let flipbookInstance = null;

    // --- Функція безпечного збереження в localStorage ---
    function savePageNumber(page) {
        if (page === undefined || page === null) return;
        try {
            localStorage.setItem(STORAGE_KEY, page);
            console.log('📌 Збережено сторінку:', page);
        } catch(e) {
            console.warn('localStorage недоступний', e);
        }
    }

    // --- Функція отримання поточної сторінки з різних джерел ---
    function getCurrentPage(flipbook) {
        if (!flipbook) return null;
        // Перебираємо найпоширеніші назви властивостей
        const possibleProps = [
            'currentPageIndex', 'pageIndex', 'currentPage', 
            'page', 'index', 'current', 'viewerPageIndex'
        ];
        for (let prop of possibleProps) {
            if (flipbook[prop] !== undefined && !isNaN(parseInt(flipbook[prop]))) {
                return parseInt(flipbook[prop]);
            }
        }
        // Можливо, сторінка захована в дочірньому об'єкті
        if (flipbook.flipPageManager && flipbook.flipPageManager.currentPageIndex !== undefined) {
            return flipbook.flipPageManager.currentPageIndex;
        }
        if (flipbook.model && flipbook.model.currentPage !== undefined) {
            return flipbook.model.currentPage;
        }
        // Якщо нічого не знайшли
        return null;
    }

    // --- Відновлення сторінки при завантаженні ---
    function restorePage(flipbook) {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return;
        const pageNum = parseInt(saved);
        console.log('↩️ Відновлюємо сторінку:', pageNum);

        // Спробуємо різні методи переходу (ви вже знаєте, що gotoPage працює)
        if (flipbook.gotoPage) {
            // Додаємо невелику затримку, щоб фліпбук точно ініціалізувався
            setTimeout(() => {
                flipbook.gotoPage(pageNum);
            }, 300);
        } else {
            console.warn('⚠️ Метод gotoPage не знайдено');
        }
    }

    // --- Пошук об'єкта фліпбука ---
    function findFlipbook() {
        return window.flipBook || window.flipbook || window.theFlipBook || window.book || window.FlipBook || null;
    }

    // --- Основний цикл очікування ---
    let attempts = 0;
    const maxAttempts = 60; // 12 секунд (60 * 200 мс)
    const interval = setInterval(() => {
        const fb = findFlipbook();
        if (fb) {
            clearInterval(interval);
            flipbookInstance = fb;
            console.log('✅ Фліпбук знайдено (мобільна версія)');

            // Відновлюємо сторінку
            restorePage(fb);

            // --- Агресивне відстеження зміни сторінки ---
            let lastPage = getCurrentPage(fb); // запам'ятовуємо поточну

            // Варіант 1: опитування кожні 300 мс (швидко реагує на зміни)
            setInterval(() => {
                const current = getCurrentPage(fb);
                if (current !== null && current !== lastPage) {
                    lastPage = current;
                    savePageNumber(current);
                }
            }, 300);

            // Варіант 2: відстеження подій дотику (для мобільних)
            if (fb.on && typeof fb.on === 'function') {
                fb.on('pageChanged', (page) => savePageNumber(page));
                fb.on('touchEnd', () => {
                    // Після дотику зачекаємо трохи і перевіримо сторінку
                    setTimeout(() => {
                        const page = getCurrentPage(fb);
                        if (page) savePageNumber(page);
                    }, 200);
                });
            }

            // Варіант 3: якщо фліпбук використовує jQuery-події
            if (window.jQuery) {
                jQuery(document).on('flipbook:pageChanged', (e, page) => savePageNumber(page));
            }

            // Варіант 4: при кожному кліку/тапі перевіряємо сторінку
            document.addEventListener('touchstart', () => {
                // Негайно перевіряємо, але даємо час на оновлення
                setTimeout(() => {
                    const page = getCurrentPage(fb);
                    if (page) savePageNumber(page);
                }, 150);
            });

            // Збереження при закритті вкладки
            window.addEventListener('beforeunload', () => {
                const finalPage = getCurrentPage(fb);
                if (finalPage) savePageNumber(finalPage);
            });
        }

        attempts++;
        if (attempts >= maxAttempts) {
            clearInterval(interval);
            console.warn('❌ Фліпбук не знайдено на мобільному');
        }
    }, 200);
})();
</script>
