<!-- Скрипт для запам'ятовування останньої сторінки (фінальна версія) -->
<script>
(function() {
    const STORAGE_KEY = 'flipbook_last_page';

    // Збереження номера сторінки
    function savePageNumber(page) {
        if (page !== undefined && page !== null) {
            localStorage.setItem(STORAGE_KEY, page);
            console.log('Збережено сторінку:', page);
        }
    }

    // Відновлення сторінки при завантаженні
    function restorePageNumber(flipbookInstance) {
        const savedPage = localStorage.getItem(STORAGE_KEY);
        if (!savedPage || !flipbookInstance) return;
        
        const pageNum = parseInt(savedPage);
        console.log('Відновлюємо сторінку:', pageNum);
        
        // Використовуємо перевірений метод gotoPage
        if (typeof flipbookInstance.gotoPage === 'function') {
            flipbookInstance.gotoPage(pageNum);
        } else {
            console.warn('Метод gotoPage не знайдено!');
        }
    }

    // Пошук об'єкта фліпбука
    function findFlipbook() {
        // Ваш фліпбук зберігається в глобальній змінній flipBook
        if (window.flipBook) return window.flipBook;
        // Запасні варіанти (на всяк випадок)
        if (window.flipbook) return window.flipbook;
        if (window.theFlipBook) return window.theFlipBook;
        if (window.book) return window.book;
        return null;
    }

    // Чекаємо появи об'єкта flipBook
    let attempts = 0;
    const maxAttempts = 50; // 10 секунд (50 * 200 мс)
    const interval = setInterval(function() {
        const fb = findFlipbook();
        if (fb) {
            clearInterval(interval);
            console.log('✅ Фліпбук знайдено, ініціалізація...');
            
            // Відновлюємо сторінку
            restorePageNumber(fb);
            
            // Відстежуємо зміну сторінки (зберігаємо нову позицію)
            let lastPage = null;
            setInterval(function() {
                // Отримуємо поточну сторінку з currentPageIndex
                let currentPage = fb.currentPageIndex;
                if (currentPage !== undefined && currentPage !== lastPage) {
                    lastPage = currentPage;
                    savePageNumber(currentPage);
                }
            }, 1000); // перевіряємо щосекунди
            
            // Додатково зберігаємо при закритті вкладки
            window.addEventListener('beforeunload', function() {
                if (fb.currentPageIndex !== undefined) {
                    savePageNumber(fb.currentPageIndex);
                }
            });
        }
        
        attempts++;
        if (attempts >= maxAttempts) {
            clearInterval(interval);
            console.warn('❌ Не вдалося знайти об\'єкт фліпбука після', maxAttempts, 'спроб');
        }
    }, 200);
})();
</script>
