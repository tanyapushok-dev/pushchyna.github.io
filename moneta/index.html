<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Підкинути монету</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 16px;
    }

    .coin-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 48px;
      padding: 40px 24px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #a0afc0;
      margin-bottom: 32px;
      font-size: 1.1rem;
    }

    .coin {
      width: 200px;
      height: 200px;
      margin: 0 auto 32px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffd966, #f2c744);
      box-shadow: 0 15px 25px rgba(0,0,0,0.5), inset 0 -5px 15px rgba(0,0,0,0.3), inset 0 5px 15px rgba(255,255,200,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.6s ease, box-shadow 0.2s;
      cursor: pointer;
      color: #2d2d2d;
      font-size: 2.8rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 rgba(255,255,200,0.5);
      border: 4px solid #e0b840;
      user-select: none;
    }

    .coin.flipping {
      transform: rotateY(360deg);
    }

    .coin span {
      display: block;
      transform: scale(2);
    }

    .result-text {
      font-size: 1.8rem;
      font-weight: 500;
      margin: 20px 0 28px;
      min-height: 3rem;
      color: #ffd966;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .flip-btn {
      background: #38bdf8;
      border: none;
      color: #0f172a;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 16px 40px;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 0 #0e7ab3, 0 10px 20px rgba(0,0,0,0.3);
      transition: all 0.08s linear;
      margin-bottom: 24px;
      width: 100%;
      max-width: 280px;
      letter-spacing: 1px;
    }

    .flip-btn:active {
      transform: translateY(8px);
      box-shadow: 0 0 0 #0e7ab3, 0 5px 15px rgba(0,0,0,0.3);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50px;
      padding: 12px;
      font-size: 1.1rem;
      color: #cbd5e1;
      margin-top: 10px;
    }

    .stats span {
      font-weight: 700;
      color: #facc15;
      margin-left: 6px;
    }

    .footer-note {
      margin-top: 28px;
      font-size: 0.9rem;
      color: #64748b;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .coin { width: 160px; height: 160px; font-size: 2.2rem; }
      .flip-btn { font-size: 1.2rem; padding: 14px 20px; }
    }
  </style>
</head>
<body>

<a href="https://pushchyna.github.io/pushtools.html" style="position: fixed; 
z-index: 9999; background: #0000003b; color: #fff; padding: 8px 16px 10px 6px; 
text-decoration: none; border-radius: 0px 0px 6px 0px; 
font-family: Arial, sans-serif; font-size: 14px; display: flex; top: 0; left: 0;">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" 
xmlns:xlink="http://www.w3.org/1999/xlink" width="16" height="16" viewBox="0 0 16 16" >
<path fill="#a78bfa" d="M2.9 8l8-8 2.2 2.1-5.9 5.9 5.9 5.9-2.2 2.1z"></path>
</svg>&nbsp; На головну</a>

  <div class="coin-container">
    <h1>🪙 Підкинь монету</h1>
    <div class="subtitle">коли важко обрати рішення</div>

    <!-- Сама "монета" -->
    <div class="coin" id="coin">
      <span id="coinSymbol">?</span>
    </div>

    <!-- Результат текстом -->
    <div class="result-text" id="resultMessage">Натисни кинути</div>

    <!-- Кнопка кидка -->
    <button class="flip-btn" id="flipButton">Підкинути</button>

    <!-- Лічильник орлів/решок (просто для цікавості) -->
    <div class="stats">
      <div>Орел <span id="headsCount">0</span></div>
      <div>Решка <span id="tailsCount">0</span></div>
    </div>

    <div class="footer-note">⚡ Випадковий вибір за долю секунди</div>
  </div>

  <script>
    (function() {
      const coin = document.getElementById('coin');
      const coinSymbol = document.getElementById('coinSymbol');
      const resultMsg = document.getElementById('resultMessage');
      const headsSpan = document.getElementById('headsCount');
      const tailsSpan = document.getElementById('tailsCount');
      const flipBtn = document.getElementById('flipButton');

      let heads = 0;
      let tails = 0;
      let isFlipping = false;

      // Функція, яка "кидає" монету
      function flipCoin() {
        if (isFlipping) return; // запобігаємо спаму

        isFlipping = true;
        coin.classList.add('flipping');

        // Випадковий результат (0 - орел, 1 - решка)
        const random = Math.random() < 0.5 ? 0 : 1;

        // Через 300 мс (половина анімації) міняємо символ, щоб збігалося із закінченням оберту
        setTimeout(() => {
          if (random === 0) {
            coinSymbol.innerText = '🦅';  // орел
            resultMsg.innerText = 'Орел';
            heads++;
            headsSpan.innerText = heads;
          } else {
            coinSymbol.innerText = '💲';  // решка (або можна використати "🌙" або "T")
            resultMsg.innerText = 'Решка';
            tails++;
            tailsSpan.innerText = tails;
          }
        }, 300);

        // Забираємо клас анімації через 600ms (повний оберт)
        setTimeout(() => {
          coin.classList.remove('flipping');
          isFlipping = false;
        }, 600);
      }

      // Обробник кнопки
      flipBtn.addEventListener('click', flipCoin);

      // Також можна кидати кліком на саму монету
      coin.addEventListener('click', flipCoin);

      // Початковий стан (не обов'язково, але можна одразу показати випадковий?)
      // За бажанням можна зробити автоматичний кидок при завантаженні:
      // window.addEventListener('load', flipCoin);
    })();
  </script>
</body>
</html>
