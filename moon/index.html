<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: #fff;
  color: #fff;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 18px;
  font-weight: 600;
  background: #1c344f;
}

.wrapper {
  position: relative;
  width: 100%;
  height: calc(100vh - 60px);
  overflow: hidden;
}

/* Головна магія масштабу */
.iframe-container {
  width: 100%;
  height: 100%;
  transform-origin: top left;
}

/* Десктоп */
@media (min-width: 768px) {
  .iframe-container {
    transform: scale(1);
  }
}

/* Телефон */
@media (max-width: 767px) {
  .iframe-container {
    transform: scale(1.0); /* можна 1.3 або 1.4 якщо треба більший текст */
  }
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

</style>
</head>
